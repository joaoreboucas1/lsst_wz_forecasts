timing: True
debug: False
stop_at_error: False
output: ./projects/lsst_wz_forecasts/chains/GENERATE_DV_BARYONS_Y10

likelihood:
  lsst_y1.combo_3x2pt:
    path: ./projects/lsst_wz_forecasts/data/
    data_file: dummy_Y10.dataset
    accuracyboost: 1.0
    integration_accuracy: 0
    lmax: 65000
    kmax_boltzmann: 7.5
    non_linear_emul: 2
    IA_model: 0   # NLA (0) or TATT (1)
    IA_redshift_evolution: 3
    add_baryons_on_dv: True
    which_bsims_add_on_dv: "owls_AGN_t85"
    print_datavector: True
    print_datavector_file: "./projects/lsst_wz_forecasts/data/Y10_BARYONS.modelvector"

params: !defaults
  - params_lens_Y10
  - params_cosmo
  - params_derived
  # ------------------------------------------------------------------------
  # Nuisance parameters below (it overwrites the default settings)
  # ------------------------------------------------------------------------

  


theory:
  camb:
    path: ./external_modules/code/CAMB
    stop_at_error: False
    use_renames: True
    extra_args:
      halofit_version: takahashi
      AccuracyBoost: 1.05
      lens_potential_accuracy: 1.0
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 15
      kmax: 7.5

sampler:
  evaluate:
    override:
      As_1e9: 2.1
      ns: 0.96
      H0: 67
      omegab: 0.049
      omegam: 0.319
      w: -1
      LSST_DZ_S1: 0
      LSST_DZ_S2: 0
      LSST_DZ_S3: 0
      LSST_DZ_S4: 0
      LSST_DZ_S5: 0
      LSST_M1: 0
      LSST_M2: 0
      LSST_M3: 0
      LSST_M4: 0
      LSST_M5: 0
      LSST_A1_1: 0
      LSST_A1_2: 0
      LSST_DZ_L1: 0
      LSST_DZ_L2: 0
      LSST_DZ_L3: 0
      LSST_DZ_L4: 0
      LSST_DZ_L5: 0
      LSST_DZ_L6: 0
      LSST_DZ_L7: 0
      LSST_DZ_L8: 0
      LSST_DZ_L9: 0
      LSST_DZ_L10: 0
      LSST_B1_1: 1.20
      LSST_B1_2: 1.27
      LSST_B1_3: 1.34
      LSST_B1_4: 1.41
