timing: True
debug: False
stop_at_error: False
output: ./projects/lsst_wz_forecasts/chains/%CHAIN_NAME%

likelihood:
  lsst_y1.cosmic_shear:
    path: ./external_modules/data/lsst_y1
    data_file: %DATASET_FILE%
    accuracyboost: 1.0
    integration_accuracy: 0
    lmax: 50000 # lmax computed for real space correlation function
    kmax_boltzmann: 5.0
    non_linear_emul: %NON_LINEAR_EMUL% # 1 EE2, 2 Halofit
    IA_model: 0        # NLA (0) or TATT (1)
    IA_code: 0         # CFASTPT (0) or FASTPT (1) (only works if not NLA)
    IA_redshift_evolution: 3 # Power-law amplitude (3)
    debug: false
    use_baryon_pca: false
    create_baryon_pca: false
    baryon_pca_select_sims: "antilles-2-99/antilles-101-378/antilles-380-400"
    filename_baryon_pca: "./projects/lsst_y1/chains/pca.txt"

params: !defaults
  - params_cosmo
  - params_derived
  

theory:
  camb:
    path: ./external_modules/code/CAMB
    stop_at_error: False
    use_renames: True
    extra_args:
      halofit_version: takahashi
      AccuracyBoost: 1.05
      lens_potential_accuracy: 1.0
      dark_energy_model: ppf
      accurate_massive_neutrino_transfers: false
      k_per_logint: 10
      kmax: 7.5

sampler:
  mcmc:
    covmat: 
    covmat_params:
    learn_proposal: True
    learn_proposal_Rminus1_min: 0.035
    learn_proposal_Rminus1_max: 150
    learn_proposal_Rminus1_max_early: 300.
    max_samples: .inf
    Rminus1_stop: %RMINUSONE%
    Rminus1_cl_stop: %RMINUSONE_95CL%
    Rminus1_cl_level: 0.95
    measure_speeds: False
    drag: False
    oversample_power: 0.2
    oversample_thin: True
    blocking:
      - [1,
          [
            As_1e9, ns, H0, omegab, omegam %EXTRA_COSMO_PARAMS%
          ]
        ]
      - [11,
          [
            LSST_DZ_S1, LSST_DZ_S2, LSST_DZ_S3, LSST_DZ_S4, LSST_DZ_S5, LSST_A1_1, LSST_A1_2
          ]
        ]
      - [25,
          [
            LSST_M1, LSST_M2, LSST_M3, LSST_M4, LSST_M5
          ]
        ]
    learn_every: 10d
    max_tries: .inf
    burn_in: 0
    Rminus1_single_split: 4